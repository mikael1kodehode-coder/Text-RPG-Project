<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div id="app">
      <header id="header">
        <h1>Overskrift</h1>
        <div class="subtitle">A text adventure, fight, loot, kill</div>
      </header>

      <main id="main">
        <div class="panel" id="player-panel">
          <div id="player-stats"></div>
          <div id="equipped-panel"></div>
          <div id="inventory"></div>
        </div>

        <div id="main-panel"></div>

        <div id="biome-bar">
          <span class="biome-label">Biome:</span>
          <button class="biome-btn" onclick="selectBiome('city')">City</button>
          <button class="biome-btn" onclick="selectBiome('sewer')">
            Sewer
          </button>
          <button class="biome-btn" onclick="selectBiome('forest')">
            Forest
          </button>
          <button class="biome-btn" onclick="selectBiome('mountain')">
            Mountain
          </button>
          <button class="biome-btn" onclick="selectBiome('lake')">Lake</button>
        </div>
      </main>
    </div>
  </body>
</html>
